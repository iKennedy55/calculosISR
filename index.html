<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora Inversa ISR</title>
  <meta name="description"
    content="Calcula el monto bruto a facturar a partir del monto líquido deseado, aplicando ISR e IVA según normativa de El Salvador." />

  <meta property="og:title" content="Calculadora Inversa ISR" />
  <meta property="og:description"
    content="Herramienta fiscal para calcular retenciones de ISR (10%) e IVA (13%) de forma inversa." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_SV" />

  <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/css/main.css?v=4" />
</head>

<body>
  <div class="top">
    <div>
      <div class="eyebrow">Herramienta Fiscal</div>
      <h1>Calculadora Inversa</h1>
    </div>
  </div>

  <main>
    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">Monto Líquido Deseado</div>
          <div class="panel-sub">Ingrese el monto final que desea recibir</div>
        </div>
      </div>

      <input type="text" id="amount-input" class="amount-input" inputmode="decimal" placeholder="0.00" value="" />

      <div class="actions toggle-row">
        <button id="btn-con-iva">Con IVA</button>
        <button id="btn-sin-iva" class="ghost">Sin IVA</button>
      </div>

      <div class="other">
        <div class="label">Desglose Fiscal</div>
      </div>

      <div class="metrics">
        <div class="metric" id="container-iva">
          <div class="label">IVA (13%)</div>
          <div class="value animated-value" id="val-iva">$0.00</div>
        </div>
        <div class="metric">
          <div class="label">ISR (10%)</div>
          <div class="value deduction animated-value" id="val-renta">-$0.00</div>
        </div>
        <div class="metric">
          <div class="label">Devengado</div>
          <div class="value animated-value" id="val-total">$0.00</div>
        </div>
      </div>

      <div class="result-panel">
        <div class="panel-head compact">
          <div class="panel-title">Fondo a Recibir</div>
          <div class="value result-value animated-value" id="val-liquid">$0.00</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="label">Normativa El Salvador • ISR 10% • IVA 13%</div>
  </footer>

  <script src="./src/js/main.js?v=6"></script>
</body>

</html>
